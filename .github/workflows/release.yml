name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp FluidSimulation dist/
          cp build/_deps/dawn-*/lib*/libwebgpu_dawn.so dist/ 2>/dev/null || true
          tar -czf FluidSimulation-linux.tar.gz -C dist .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-linux
          path: FluidSimulation-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp Release/FluidSimulation.exe dist/
          cp Release/*.dll dist/ 2>/dev/null || true
          cd dist && 7z a ../FluidSimulation-windows.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-windows
          path: FluidSimulation-windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FluidSimulation-linux/FluidSimulation-linux.tar.gz
            FluidSimulation-windows/FluidSimulation-windows.zip
