name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: release
            suffix: linux
          - preset: release-no-python
            suffix: linux-no-scripting
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-${{ matrix.preset }}-deps-

      - name: Install dependencies
        run: sudo apt-get install -y gcc-14 g++-14 libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libdbus-1-dev libpng-dev python3-dev

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }} -DAPP_VERSION="${{ github.ref_name }}" -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/FluidSimulation
          cp FluidSimulation dist/FluidSimulation/
          cp *.so dist/FluidSimulation/ 2>/dev/null || true
          if [ "${{ matrix.preset }}" = "release" ]; then
            mkdir -p dist/FluidSimulation/plugins/plugin-installer
            cp plugins/plugin-installer/* dist/FluidSimulation/plugins/plugin-installer/
          fi
          tar -czf FluidSimulation-${{ matrix.suffix }}.tar.gz -C dist FluidSimulation

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-${{ matrix.suffix }}
          path: FluidSimulation-${{ matrix.suffix }}.tar.gz

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: release
            suffix: windows
          - preset: release-no-python
            suffix: windows-no-scripting
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: ${{ runner.os }}-${{ matrix.preset }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-${{ matrix.preset }}-deps-

      - name: Install dependencies
        run: vcpkg install zlib

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }} -DAPP_VERSION="${{ github.ref_name }}" -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_VERBOSE_MAKEFILE=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/FluidSimulation
          cp FluidSimulation.exe dist/FluidSimulation/
          cp *.dll dist/FluidSimulation/ 2>/dev/null || true
          if [ "${{ matrix.preset }}" = "release" ]; then
            mkdir -p dist/FluidSimulation/plugins/plugin-installer
            cp plugins/plugin-installer/* dist/FluidSimulation/plugins/plugin-installer/
          fi
          cd dist && 7z a ../FluidSimulation-${{ matrix.suffix }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-${{ matrix.suffix }}
          path: FluidSimulation-${{ matrix.suffix }}.zip

  build-appimage:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/release/_deps
          key: ${{ runner.os }}-release-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-release-deps-

      - name: Install dependencies
        run: sudo apt-get install -y gcc-14 g++-14 libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libdbus-1-dev libpng-dev python3-dev

      - name: Configure CMake
        run: cmake --preset release -DAPP_VERSION="${{ github.ref_name }}" -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build --preset release -j$(nproc)

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          cp FluidSimulation AppDir/usr/bin/
          cp *.so AppDir/usr/bin/ 2>/dev/null || true

          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/fluidsim.png
          cp packaging/fluidsim.desktop AppDir/usr/share/applications/

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q -O runtime-x86_64 https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64
          chmod +x runtime-x86_64

      - name: Build AppImage
        env:
          LDAI_RUNTIME_FILE: ${{ github.workspace }}/runtime-x86_64
        run: |
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-appimage
          path: FluidSimulation-x86_64.AppImage

  release:
    needs: [build-linux, build-windows, build-appimage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FluidSimulation-linux/FluidSimulation-linux.tar.gz
            FluidSimulation-linux-no-scripting/FluidSimulation-linux-no-scripting.tar.gz
            FluidSimulation-windows/FluidSimulation-windows.zip
            FluidSimulation-windows-no-scripting/FluidSimulation-windows-no-scripting.zip
            FluidSimulation-appimage/FluidSimulation-x86_64.AppImage
