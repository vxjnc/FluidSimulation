name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install dependencies
        run: sudo apt-get install -y gcc-14 g++-14 libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libdbus-1-dev libpng-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DAPP_VERSION=${{ github.ref_name }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/FluidSimulation
          cp FluidSimulation dist/FluidSimulation/
          tar -czf FluidSimulation-linux.tar.gz -C dist FluidSimulation

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-linux
          path: FluidSimulation-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install dependencies
        run: vcpkg install zlib

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DAPP_VERSION=${{ github.ref_name }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp Release/FluidSimulation.exe dist/
          cd dist && 7z a ../FluidSimulation-windows.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FluidSimulation-windows
          path: FluidSimulation-windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FluidSimulation-linux/FluidSimulation-linux.tar.gz
            FluidSimulation-windows/FluidSimulation-windows.zip
